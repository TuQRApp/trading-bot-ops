name: Auto-analyze trading bot files

on:
  push:
    paths:
      - 'data.json'

concurrency:
  group: bot-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WORKER_URL: https://trading-upload.nestragues.workers.dev
        run: python scripts/analyze.py
